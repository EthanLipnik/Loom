<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">LoomKit connection workflow diagram</title>
  <desc id="desc">A LoomConnectionHandle feeds message, event, and transfer streams into app-owned runtime coordinators.</desc>
  <rect width="760" height="240" fill="#f6f8fb"/>
  <rect x="40" y="70" width="180" height="100" rx="18" fill="#0f172a"/>
  <text x="130" y="112" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff">LoomConnection</text>
  <text x="130" y="140" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#ffffff">Handle</text>
  <rect x="300" y="30" width="180" height="58" rx="16" fill="#dbeafe"/>
  <text x="390" y="66" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1e3a8a">messages</text>
  <rect x="300" y="92" width="180" height="58" rx="16" fill="#dcfce7"/>
  <text x="390" y="128" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#166534">events</text>
  <rect x="300" y="154" width="180" height="58" rx="16" fill="#fee2e2"/>
  <text x="390" y="190" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#991b1b">transfers</text>
  <rect x="560" y="70" width="160" height="100" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="640" y="112" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0f172a">App-Owned</text>
  <text x="640" y="140" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#0f172a">Coordinator</text>
  <path d="M220 120 H300" stroke="#64748b" stroke-width="4" fill="none"/>
  <path d="M480 58 H560" stroke="#64748b" stroke-width="4" fill="none"/>
  <path d="M480 121 H560" stroke="#64748b" stroke-width="4" fill="none"/>
  <path d="M480 183 H560" stroke="#64748b" stroke-width="4" fill="none"/>
</svg>
